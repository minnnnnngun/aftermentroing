[variables]
NIXPACKS_NO_CACHE = "1"
npm_config_build_from_source = "true"

[phases.setup]
nixPkgs = ["nodejs_22", "python3", "gcc", "gnumake"]

[phases.install]
cmds = [
    "npm ci --omit=dev",
    "rm -rf node_modules/sqlite3/build",
    "npm rebuild sqlite3 --build-from-source",
]

[start]
cmd = "npm start"